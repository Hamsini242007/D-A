ai_usage_summary: |
  ChatGPT was used as an engineering assistant for
  architecture discussion, debugging, code review,
  experimentation support, and documentation.
  Final ranking logic, evaluation, validation,
  experimentation, and design decisions were
  implemented and verified by the team.

methodology_summary: |
  We developed a hybrid candidate ranking pipeline
  combining rule-based retrieval, behavioral signal
  analysis, honeypot detection, retrieval-based
  candidate filtering, semantic reranking, and
  explainable ranking.

  Candidate profiles are initially scored using
  explicit features including skill overlap,
  experience matching, recruiter engagement
  signals, and profile quality.

  Potential honeypot candidates are detected using
  consistency checks across experience, salary,
  and behavioral signals.

  The top retrieved candidates are then reranked
  using SentenceTransformer semantic similarity
  between candidate profiles and the target job
  description.

  Final rankings are generated using a weighted
  hybrid score combining symbolic and semantic
  relevance.

  The system processes 100,000 candidates in
  approximately 110.74 seconds on CPU-only
  hardware and achieves a 0% honeypot rate
  in the final top-100 results.

